<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discount Engine</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <form>
        <h1>Discount Engine</h1>

        <label for="purchaseAmount">Enter purchase amount</label>
        <input id="purchaseAmount" type="number" placeholder="$">

        <label for="hasCoupon">Has coupon?</label>
        <select id="hasCoupon">
            <option value="true">True</option>
            <option value="false">False</option>
        </select>

        <button type="button" onclick="calculateDiscount()">Calculate</button>

        <p id="finalPrice"></p>
    </form>

    <script src="js/index.js"></script>
</body>
</html>
